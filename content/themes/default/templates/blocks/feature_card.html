<div style="max-width: 400px; margin: 20px auto; padding: 30px; background: {{ settings.bg_color }}; border: 1px solid #e2e8f0; border-radius: {{ settings.border_radius }}px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); box-sizing: border-box; text-align: center;">
    <div style="font-size: 40px; margin-bottom: 16px; color: {{ settings.icon_color }};">{{ data.icon }}</div>
    <h3 style="margin: 0 0 10px 0; font-size: 20px; font-weight: bold; color: #1e293b;">{{ data.title }}</h3>
    <p style="margin: 0; color: #475569; font-size: 15px; line-height: 1.6;">{{ data.description }}</p>
</div>
