<!-- content/themes/default/templates/blocks/video.html -->
<div style="margin: 20px auto; width: {{ settings.width | default('100') }}%; max-width: 800px; box-sizing: border-box;">
    <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px;">
        <iframe src="{{ data.embed_url | default('https://www.youtube.com/embed/dQw4w9WgXcQ') }}" 
                frameborder="0" 
                allowfullscreen 
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
        </iframe>
    </div>
</div>
