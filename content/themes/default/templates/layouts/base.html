<!-- content/themes/default/templates/layouts/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | ForgePress</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --text: #0f172a;
            --text-muted: #475569;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
        }
        a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover {
            color: var(--primary-hover);
        }
        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }
        main {
            flex-grow: 1;
            width: 100%;
        }
        footer {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .container {
            max-width: 1024px;
            margin: 0 auto;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            max-width: 1024px;
            margin: 0 auto;
        }
        .logo {
            font-weight: 800;
            font-size: 20px;
            color: var(--primary);
        }
        .logo:hover {
            color: var(--primary-hover);
        }
        .nav-links {
            display: flex;
            gap: 20px;
            font-weight: 600;
        }
        
        /* Master Block Layouts */
        .forge-page {
            width: 100%;
        }
        
        /* Fallback styling if a block template is missing */
        .forge-block-fallback {
            border: 2px dashed #cbd5e1;
            padding: 30px;
            margin: 20px auto;
            max-width: 800px;
            text-align: center;
            background: #f1f5f9;
            border-radius: 8px;
            color: #64748b;
            font-weight: 500;
        }
    </style>
</head>
<body>
    {% include "layouts/header.html" %}
    
    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "layouts/footer.html" %}
</body>
</html>
