<div style="max-width: 800px; margin: 20px auto; padding: 0 20px; box-sizing: border-box;">
    <div style="background: {{ settings.bg_color }}; color: {{ settings.text_color }}; border-radius: {{ settings.border_radius }}px; padding: 16px 20px; display: flex; gap: 14px; align-items: center; box-sizing: border-box;">
        <span style="font-size: 20px; line-height: 1;">{{ data.icon }}</span>
        <p style="margin: 0; font-size: 14px; font-weight: 500; line-height: 1.5; flex: 1;">{{ data.message }}</p>
    </div>
</div>
