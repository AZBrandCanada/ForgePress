<div style="margin: 30px auto; width: {{ settings.width | default('100') }}%; max-width: 1024px; box-sizing: border-box; padding: 0 20px;">
    <div style="width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #cbd5e1; height: {{ settings.height }}px;">
        <iframe src="{{ data.embed_url }}" 
                width="100%" 
                height="100%" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy">
        </iframe>
    </div>
</div>
