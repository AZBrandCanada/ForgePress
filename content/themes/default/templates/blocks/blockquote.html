<div style="max-width: 800px; margin: 30px auto; padding: 0 20px; box-sizing: border-box;">
    <blockquote style="background: {{ settings.bg_color }}; border-left: 6px solid {{ settings.border_color }}; margin: 0; padding: 24px 30px; border-radius: 0 8px 8px 0; box-sizing: border-box;">
        <p style="margin: 0 0 12px 0; font-size: {{ settings.font_size }}px; font-style: italic; color: #1e293b; line-height: 1.6;">
            "{{ data.quote }}"
        </p>
        <cite style="font-weight: bold; color: {{ settings.border_color }}; font-style: normal; font-size: 14px;">
            — {{ data.author }}
        </cite>
    </blockquote>
</div>
