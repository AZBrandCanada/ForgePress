<!-- content/themes/default/templates/blocks/hero_section.html -->
<section class="forge-hero" style="
    background-color: {{ settings.background | default('#4f46e5') }}; 
    padding: {{ settings.padding_v | default('80') }}px {{ settings.padding_h | default('20') }}px;
    display: flex;
    flex-direction: {{ settings.flex_direction | default('column') }};
    justify-content: {{ settings.justify_content | default('center') }};
    align-items: {{ settings.align_items | default('center') }};
    box-sizing: border-box;
    width: 100%;
">
    <div class="hero-inner" style="
        max-width: 1024px;
        width: 100%;
        display: flex;
        flex-direction: inherit;
        justify-content: inherit;
        align-items: inherit;
        color: white;
        box-sizing: border-box;
        gap: 20px;
    ">
        {{ nested_content | safe }}
    </div>
</section>
