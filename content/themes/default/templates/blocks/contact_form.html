<div style="max-width: {{ settings.max_width }}px; margin: 40px auto; padding: 30px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-family: inherit;">
    <form action="/api/webhooks/form-submission" method="POST" style="display: flex; flex-direction: column; gap: 16px; margin: 0;">
        <div>
            <label style="display: block; font-size: 13px; font-weight: bold; color: #475569; margin-bottom: 6px;">{{ data.placeholder_name }}</label>
            <input type="text" name="name" required placeholder="John Doe" style="width: 100%; padding: 10px 12px; background: {{ settings.input_bg }}; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" />
        </div>
        <div>
            <label style="display: block; font-size: 13px; font-weight: bold; color: #475569; margin-bottom: 6px;">{{ data.placeholder_email }}</label>
            <input type="email" name="email" required placeholder="john@example.com" style="width: 100%; padding: 10px 12px; background: {{ settings.input_bg }}; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" />
        </div>
        <div>
            <label style="display: block; font-size: 13px; font-weight: bold; color: #475569; margin-bottom: 6px;">Your Message</label>
            <textarea name="message" rows="4" required placeholder="How can we help?" style="width: 100%; padding: 10px 12px; background: {{ settings.input_bg }}; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: inherit; resize: vertical;"></textarea>
        </div>
        <button type="submit" style="background: {{ settings.btn_bg }}; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
            Send Inquiry Message
        </button>
    </form>
</div>
